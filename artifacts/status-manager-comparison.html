<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投递状态设置视觉对照</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; background: #111827; color: #f9fafb; font: 14px/1.5 sans-serif; }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    figure { margin: 0; min-width: 0; }
    figcaption { margin-bottom: 8px; font-weight: 600; }
    img { display: block; width: 100%; border: 1px solid #374151; background: white; }
  </style>
</head>
<body>
  <main>
    <figure>
      <figcaption>视觉定稿（用户补充：弹窗必须水平、垂直居中）</figcaption>
      <img src="./status-manager-source.png" alt="状态管理视觉定稿" />
    </figure>
    <figure>
      <figcaption>浏览器实现（1280 × 720）</figcaption>
      <img src="./status-manager-implementation.png" alt="状态管理浏览器实现" />
    </figure>
  </main>
</body>
</html>
