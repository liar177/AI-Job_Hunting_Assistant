name: Build and publish release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to build, for example v0.2.0
        required: true
        type: string
      release_name:
        description: Release title (leave empty to use the default title)
        required: false
        type: string
      release_body:
        description: Release notes (leave empty to use the default notes)
        required: false
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare release metadata
        id: release
        shell: pwsh
        env:
          COMMIT_SHA: ${{ github.sha }}
          INPUT_TAG: ${{ inputs.release_tag }}
          INPUT_NAME: ${{ inputs.release_name }}
          INPUT_BODY: ${{ inputs.release_body }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $tag = $env:INPUT_TAG.Trim()
          if (-not $tag.StartsWith('v')) {
            throw "Release tag must start with 'v'. Received: $tag"
          }

          $name = $env:INPUT_NAME.Trim()
          if (-not $name) {
            $name = "AI Job Hunting Assistant $tag"
          }

          $body = $env:INPUT_BODY.Trim()
          if (-not $body) {
            $body = "Automated Windows build from commit $env:COMMIT_SHA.`n`nDownload the ``.exe`` asset below to install the application."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          $isPrerelease = $env:INPUT_PRERELEASE -eq 'true'
          "prerelease=$($isPrerelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          $delimiter = "RELEASE_BODY_$([guid]::NewGuid())"
          "body<<$delimiter" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          $delimiter >> $env:GITHUB_OUTPUT

      - name: Build and publish GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.name }}
          releaseBody: ${{ steps.release.outputs.body }}
          releaseDraft: false
          prerelease: ${{ steps.release.outputs.prerelease }}
